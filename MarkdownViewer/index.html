<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Markdown Editor & Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Panel -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>MarkDowner</span>
                </div>
                <button class="btn-sidebar-toggle" id="btn-sidebar-close" title="Collapse Sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="var(--text-main)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <div class="sidebar-content">


                <!-- Template Manager -->
                <div class="sidebar-section">
                    <h3>Templates</h3>
                    <div class="template-grid">
                        <button class="template-card" data-template="readme">
                            <div class="template-card-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                            </div>
                            <div class="template-card-info">
                                <h4>README.md</h4>
                                <p>Standard project documentation</p>
                            </div>
                        </button>
                        <button class="template-card" data-template="report">
                            <div class="template-card-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            </div>
                            <div class="template-card-info">
                                <h4>Report</h4>
                                <p>Technical brief template</p>
                            </div>
                        </button>
                        <button class="template-card" data-template="cheat-sheet">
                            <div class="template-card-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                            </div>
                            <div class="template-card-info">
                                <h4>Cheat Sheet</h4>
                                <p>Quick Markdown formatting reference</p>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Document Stats -->
                <div class="sidebar-section">
                    <h3>Statistics</h3>
                    <div class="stats-panel">
                        <div class="stat-row">
                            <span class="stat-label">Words</span>
                            <span class="stat-value" id="stat-words">0</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Characters</span>
                            <span class="stat-value" id="stat-chars">0</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Lines</span>
                            <span class="stat-value" id="stat-lines">0</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Est. Read Time</span>
                            <span class="stat-value" id="stat-time">0m</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar Footer (Theme controls) -->
            <div class="sidebar-footer">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.8rem; font-weight:500; color:var(--text-muted);">UI Theme</span>
                    <div class="theme-switch">
                        <button class="theme-btn" id="theme-light" title="Light Mode">
                            <svg width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        </button>
                        <button class="theme-btn active" id="theme-dark" title="Dark Mode">
                            <svg width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace Area -->
        <main class="main-area">
            <!-- Top Toolbar -->
            <header class="toolbar">
                <div class="toolbar-left">
                    <button class="btn-sidebar-toggle" id="btn-sidebar-open" title="Expand Sidebar" style="display:none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="toolbar-title-container">
                        <input type="text" class="doc-title-input" id="doc-title" value="Untitled Document" placeholder="Document Title...">
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <input type="file" id="file-loader" accept=".md,.txt" style="display:none;">
                    <button class="btn" id="btn-import" title="Load Markdown File">
                        <svg width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <span>Open</span>
                    </button>
                    <button class="btn" id="btn-export-md" title="Export as Markdown File">
                        <svg width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        <span>Download</span>
                    </button>
                    
                    <div class="toolbar-separator"></div>
                    
                    <button class="btn btn-primary" id="btn-export-pdf" title="Export as PDF Document">
                        <svg width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        <span>Save PDF</span>
                    </button>
                </div>
            </header>

            <!-- Workspace Panes -->
            <div class="workspace-panes">
                <!-- Editor Container -->
                <div class="pane editor-pane" id="editor-pane">
                    <div class="pane-header">
                        <span class="pane-title">Editor</span>
                        <!-- Quick Insert Formatting controls -->
                        <div class="formatting-toolbar">
                            <button class="fmt-btn" data-format="bold" title="Bold (Ctrl+B)">
                                <strong>B</strong>
                            </button>
                            <button class="fmt-btn" data-format="italic" title="Italic (Ctrl+I)">
                                <em>I</em>
                            </button>
                            <button class="fmt-btn" data-format="heading" title="Heading (Ctrl+H)">
                                H
                            </button>
                            <button class="fmt-btn" data-format="link" title="Link (Ctrl+K)">
                                <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                            </button>
                            <button class="fmt-btn" data-format="image" title="Image">
                                <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            </button>
                            <button class="fmt-btn" data-format="code" title="Code Block">
                                <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                            </button>
                            <button class="fmt-btn" data-format="list-ul" title="Unordered List">
                                <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                            </button>
                            <button class="fmt-btn" data-format="list-ol" title="Ordered List">
                                <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="10" y1="6" x2="21" y2="6"></line><line x1="10" y1="12" x2="21" y2="12"></line><line x1="10" y1="18" x2="21" y2="18"></line><path d="M4 6H5V10H3"></path><path d="M4 14h1.5a1.5 1.5 0 0 1 0 3H4"></path></svg>
                            </button>
                            <button class="fmt-btn" data-format="table" title="Table">
                                <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" fill="none"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="12" y1="3" x2="12" y2="21"></line></svg>
                            </button>
                            <div class="toolbar-separator" style="height:12px; margin:0 2px;"></div>
                            <button class="fmt-btn" id="btn-clear" title="Clear Editor" style="stroke:var(--danger)">
                                <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </div>
                    <div class="editor-wrapper">
                        <textarea class="markdown-textarea" id="editor" placeholder="Write your markdown here..." spellcheck="true"></textarea>
                    </div>
                </div>

                <!-- Resizer Gutter -->
                <div class="resizer" id="pane-resizer"></div>

                <!-- Preview Container -->
                <div class="pane preview-pane" id="preview-pane">
                    <div class="pane-header">
                        <span class="pane-title">Preview</span>
                        <div style="display:flex; gap:8px;">
                            <label style="font-size:0.75rem; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
                                <input type="checkbox" id="chk-sync-scroll" checked style="cursor:pointer;">
                                <span>Sync Scroll</span>
                            </label>
                        </div>
                    </div>
                    <div class="preview-wrapper" id="preview-wrapper">
                        <div class="preview-content" id="preview-content">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Status Bar -->
            <footer class="statusbar">
                <div class="statusbar-left">

                </div>
                <div class="statusbar-right">
                    <span id="stat-words-footer">0 words</span>
                    <span id="stat-chars-footer">0 chars</span>
                </div>
            </footer>
        </main>
    </div>

    <!-- Confirm Modal -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Confirm Action</div>
            <div class="modal-body" id="modal-message">Are you sure you want to proceed?</div>
            <div class="modal-footer">
                <button class="btn" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm" style="background-color:var(--danger); border-color:var(--danger)">Proceed</button>
            </div>
        </div>
    </div>

    <!-- Local scripts for offline support -->
    <script src="lib/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
