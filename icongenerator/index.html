<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IconForge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <a class="hub-link" href="../index.html">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
                    <span>Hub</span>
                </a>
                <div>
                    <h1>IconForge</h1>
                    <p id="sourceMeta">No source image loaded</p>
                </div>
            </div>
            <div class="top-actions">
                <label class="button primary" for="fileInput">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m17 8-5-5-5 5"></path><path d="M12 3v12"></path></svg>
                    <span>Open Image</span>
                </label>
                <input id="fileInput" type="file" accept="image/*">
                <button class="button" id="resetBtn" disabled>Reset</button>
                <button class="button primary" id="downloadAllBtn" disabled>Download Set</button>
            </div>
        </header>

        <main class="workspace">
            <aside class="panel">
                <section>
                    <h2>Source</h2>
                    <div class="drop-zone" id="dropZone">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4"></rect><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>
                        <strong>Drop image</strong>
                        <span>PNG with transparency works best.</span>
                    </div>
                </section>

                <section>
                    <h2>Shape</h2>
                    <label class="control-label" for="fitSelect">Image Fit</label>
                    <select id="fitSelect">
                        <option value="cover">Cover square</option>
                        <option value="contain">Contain full image</option>
                    </select>

                    <label class="slider-row">Padding <span id="paddingValue">10</span></label>
                    <input id="paddingRange" type="range" min="0" max="35" value="10">

                    <label class="slider-row">Corner Radius <span id="radiusValue">22</span></label>
                    <input id="radiusRange" type="range" min="0" max="50" value="22">
                </section>

                <section>
                    <h2>Background</h2>
                    <label class="check-row">
                        <input id="transparentCheck" type="checkbox" checked>
                        <span>Transparent background</span>
                    </label>
                    <div class="color-row">
                        <input id="backgroundColor" type="color" value="#111827">
                        <button class="button" id="applyBgBtn" disabled>Use Color</button>
                    </div>
                </section>

                <section>
                    <h2>Project</h2>
                    <label class="control-label" for="appNameInput">App Name</label>
                    <input id="appNameInput" type="text" value="My App">
                    <label class="control-label" for="themeColorInput">Theme Color</label>
                    <input id="themeColorInput" type="color" value="#14b8a6">
                </section>
            </aside>

            <section class="preview-area">
                <div class="preview-board">
                    <canvas id="mainPreview" width="512" height="512"></canvas>
                </div>
                <div class="preview-strip" id="previewStrip"></div>
            </section>

            <aside class="panel output-panel">
                <section>
                    <h2>Downloads</h2>
                    <button class="button full" id="downloadIcoBtn" disabled>Download favicon.ico</button>
                    <button class="button full" id="downloadPngsBtn" disabled>Download PNG Sizes</button>
                    <button class="button full" id="downloadManifestBtn" disabled>Download manifest.json</button>
                    <button class="button full" id="downloadHtmlBtn" disabled>Download HTML Snippet</button>
                </section>

                <section>
                    <h2>Generated Sizes</h2>
                    <div class="size-list" id="sizeList"></div>
                </section>

                <section>
                    <h2>HTML Snippet</h2>
                    <textarea id="snippetOutput" spellcheck="false" readonly></textarea>
                    <button class="button full" id="copySnippetBtn" disabled>Copy Snippet</button>
                </section>
            </aside>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
