<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="studio-container">
        <!-- Header -->
        <header class="studio-header">
            <div class="header-left">
                <a href="../index.html" class="btn-back">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <span>Hub</span>
                </a>
                <h1>Pixel Art Studio</h1>
            </div>
            <div class="header-right">
                <button class="action-btn" id="exportBtn">Export Spritesheet</button>
                <button class="action-btn" id="exportGifBtn">Export GIF</button>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="studio-workspace">
            <!-- Left Toolbar -->
            <aside class="sidebar tools-panel">
                <h2>Tools</h2>
                <div class="tools-grid">
                    <button class="tool-btn active" id="tool-pencil" title="Pencil">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    </button>
                    <button class="tool-btn" id="tool-eraser" title="Eraser">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l7-7 9 7-2 4z"></path></svg>
                    </button>
                    <button class="tool-btn" id="tool-bucket" title="Paint Bucket">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7z"></path></svg>
                    </button>
                    <button class="tool-btn" id="tool-picker" title="Color Picker">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l6-6M8.5 8.5a2.121 2.121 0 0 1 3 3L7 16l-4 1 1-4 4.5-4.5z"></path></svg>
                    </button>
                </div>

                <div class="divider"></div>

                <div class="setting-group">
                    <label>Grid Size</label>
                    <select id="gridSizeSelect">
                        <option value="8">8 x 8</option>
                        <option value="16" selected>16 x 16</option>
                        <option value="32">32 x 32</option>
                        <option value="64">64 x 64</option>
                    </select>
                </div>

                <div class="setting-group checkbox-row">
                    <label><input type="checkbox" id="showGridCheck" checked> Show Grid</label>
                </div>

                <div class="divider"></div>

                <div class="undo-redo-row">
                    <button class="action-btn" id="undoBtn" title="Undo">Undo</button>
                    <button class="action-btn" id="redoBtn" title="Redo">Redo</button>
                </div>
                <button class="action-btn danger" id="clearBtn" style="width: 100%; margin-top: 8px;">Clear Frame</button>
            </aside>

            <!-- Center Canvas Board -->
            <main class="canvas-container">
                <canvas id="paintCanvas" width="480" height="480"></canvas>
            </main>

            <!-- Right Color Palette & Preview -->
            <aside class="sidebar color-panel">
                <h2>Palette</h2>
                <div class="color-picker-row">
                    <input type="color" id="colorPicker" value="#06b6d4">
                    <input type="text" id="colorHex" value="#06b6d4">
                </div>
                
                <div class="palette-swatches" id="swatchesContainer"></div>

                <div class="divider"></div>

                <h2>Preview</h2>
                <div class="preview-box">
                    <canvas id="animationPreview" width="128" height="128"></canvas>
                </div>
                <div class="preview-controls">
                    <button class="action-btn" id="playPreviewBtn">Play</button>
                    <div class="fps-slider-group">
                        <label>FPS: <span id="fpsVal">6</span></label>
                        <input type="range" id="fpsSlider" min="1" max="20" step="1" value="6">
                    </div>
                </div>
            </aside>
        </div>

        <!-- Bottom Animation Timeline -->
        <footer class="timeline-panel">
            <div class="timeline-header">
                <h2>Animation Timeline</h2>
                <div class="timeline-actions">
                    <button class="action-btn" id="addFrameBtn">+ Add Frame</button>
                    <button class="action-btn" id="duplicateFrameBtn">Duplicate Frame</button>
                    <button class="action-btn danger" id="deleteFrameBtn">Delete Frame</button>
                </div>
            </div>
            <div class="frames-carousel-container">
                <div class="frames-carousel" id="framesCarousel"></div>
            </div>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
