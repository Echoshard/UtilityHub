<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptune Composer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="composer-container">
        <!-- Header -->
        <header class="composer-header">
            <div class="header-left">
                <a href="../index.html" class="btn-back">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span>Back to Hub</span>
                </a>
                <h1>Chiptune Composer</h1>
            </div>
            <div class="header-right">
                <button id="playBtn" class="control-btn play-btn">Play</button>
                <button id="stopBtn" class="control-btn stop-btn">Stop</button>
                
                <div class="tempo-control">
                    <label for="bpmSlider">BPM: <span id="bpmVal">120</span></label>
                    <input type="range" id="bpmSlider" min="60" max="240" step="1" value="120">
                </div>

                <div class="tempo-control">
                    <label for="stepsSelect">Steps: </label>
                    <select id="stepsSelect" style="background: transparent; border: none; color: #fff; font-weight: 600; font-family: var(--font-ui); font-size: 0.85rem; outline: none; cursor: pointer; padding-left: 4px;">
                        <option value="16" selected style="background: var(--bg-panel); color: #fff;">16</option>
                        <option value="32" style="background: var(--bg-panel); color: #fff;">32</option>
                        <option value="64" style="background: var(--bg-panel); color: #fff;">64</option>
                    </select>
                </div>

                <button id="clearBtn" class="action-btn">Clear</button>
                
                <label class="action-btn" style="cursor: pointer; display: inline-flex; align-items: center;">
                    <span>Load JSON</span>
                    <input type="file" id="loadJsonInput" accept=".json" style="display: none;">
                </label>
                
                <button id="saveJsonBtn" class="action-btn">Save JSON</button>
                <button id="exportWavBtn" class="action-btn accent-btn">Export WAV</button>
            </div>
        </header>

        <!-- Workspace -->
        <main class="composer-workspace">
            <!-- Sidebar Options -->
            <aside class="composer-sidebar">
                <h2>Channels</h2>
                <div class="channel-tabs" role="tablist">
                    <button class="channel-tab active" data-channel="melody" role="tab" aria-selected="true">
                        <span class="indicator melody-dot"></span>
                        Melody (Triangle)
                    </button>
                    <button class="channel-tab" data-channel="lead" role="tab" aria-selected="false">
                        <span class="indicator lead-dot"></span>
                        Lead (Square)
                    </button>
                    <button class="channel-tab" data-channel="bass" role="tab" aria-selected="false">
                        <span class="indicator bass-dot"></span>
                        Bass (Sawtooth)
                    </button>
                    <button class="channel-tab" data-channel="percussion" role="tab" aria-selected="false">
                        <span class="indicator percussion-dot"></span>
                        Percussion (Noise)
                    </button>
                </div>

                <div class="divider"></div>

                <h2>Synth Envelope (ADSR)</h2>
                <div class="envelope-settings">
                    <div class="slider-group">
                        <label>Attack: <span id="attackVal">0.05</span>s</label>
                        <input type="range" id="attackSlider" min="0.001" max="1" step="0.01" value="0.05">
                    </div>
                    <div class="slider-group">
                        <label>Decay: <span id="decayVal">0.1</span>s</label>
                        <input type="range" id="decaySlider" min="0.01" max="1" step="0.01" value="0.1">
                    </div>
                    <div class="slider-group">
                        <label>Sustain: <span id="sustainVal">0.6</span></label>
                        <input type="range" id="sustainSlider" min="0" max="1" step="0.05" value="0.6">
                    </div>
                    <div class="slider-group">
                        <label>Release: <span id="releaseVal">0.15</span>s</label>
                        <input type="range" id="releaseSlider" min="0.01" max="1.5" step="0.01" value="0.15">
                    </div>
                </div>

                <div class="divider"></div>

                <h2>Volume</h2>
                <div class="slider-group">
                    <label>Master Gain: <span id="volumeVal">70</span>%</label>
                    <input type="range" id="volumeSlider" min="0" max="100" step="1" value="70">
                </div>
            </aside>

            <!-- Center Sequencer Grid -->
            <section class="sequencer-container">
                <div class="sequencer-grid-header">
                    <div class="note-label-spacer">Note</div>
                    <div class="step-labels" id="stepLabelsContainer"></div>
                </div>
                <div class="sequencer-grid-body" id="sequencerGrid">
                    <!-- Dynamic Grid Rows Go Here -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
