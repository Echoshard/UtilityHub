<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadAloud - Offline Text-to-Speech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Panel for Controls -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="btn-back" title="Back to Hub">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span>Hub</span>
                </a>
                <div class="logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <span>ReadAloud</span>
                </div>
            </div>
            
            <div class="sidebar-content">
                <!-- Settings Section -->
                <div class="sidebar-section">
                    <h3>Voice Settings</h3>
                    <div class="settings-group">
                        <div class="control-row">
                            <label for="voice-select">Choose Voice</label>
                            <select id="voice-select" class="custom-select">
                                <option value="">Loading system voices...</option>
                            </select>
                        </div>
                        
                        <div class="control-row">
                            <div class="slider-label">
                                <span>Speed (Rate)</span>
                                <span id="rate-val">1.0x</span>
                            </div>
                            <input type="range" id="rate-slider" class="custom-slider" min="0.5" max="3" step="0.1" value="1.0">
                        </div>

                        <div class="control-row">
                            <div class="slider-label">
                                <span>Pitch</span>
                                <span id="pitch-val">1.0</span>
                            </div>
                            <input type="range" id="pitch-slider" class="custom-slider" min="0.5" max="2" step="0.1" value="1.0">
                        </div>

                        <div class="control-row">
                            <div class="slider-label">
                                <span>Volume</span>
                                <span id="volume-val">100%</span>
                            </div>
                            <input type="range" id="volume-slider" class="custom-slider" min="0" max="1" step="0.05" value="1.0">
                        </div>
                    </div>
                </div>

                <!-- Preset Texts Section -->
                <div class="sidebar-section">
                    <h3>Preset Samples</h3>
                    <div class="preset-grid">
                        <button class="preset-btn" data-preset="quote">Load Quote</button>
                        <button class="preset-btn" data-preset="tech">Load Article</button>
                        <button class="preset-btn" data-preset="poem">Load Poem</button>
                    </div>
                </div>
            </div>

            <!-- Theme controls -->
            <div class="sidebar-footer">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.8rem; font-weight:500; color:var(--text-muted);">UI Theme</span>
                    <div class="theme-switch">
                        <button class="theme-btn" id="theme-light" title="Light Mode">
                            <svg width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        </button>
                        <button class="theme-btn active" id="theme-dark" title="Dark Mode">
                            <svg width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace Area -->
        <main class="main-area">
            <!-- Top Toolbar -->
            <header class="toolbar">
                <div class="toolbar-left">
                    <span class="hub-app-title">Voice Reader</span>
                </div>
                
                <div class="playback-controls">
                    <button class="btn btn-primary" id="btn-play" title="Play / Resume">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        <span id="play-text">Speak</span>
                    </button>
                    <button class="btn" id="btn-pause" title="Pause" disabled>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </svg>
                        <span>Pause</span>
                    </button>
                    <button class="btn btn-danger" id="btn-stop" title="Stop / Reset" disabled>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                            <rect x="4" y="4" width="16" height="16"></rect>
                        </svg>
                        <span>Stop</span>
                    </button>
                </div>
            </header>

            <!-- Split Pane Container -->
            <div class="workspace-panes">
                <!-- Text Editor Pane -->
                <div class="pane editor-pane" id="editor-pane">
                    <div class="pane-header">
                        <span class="pane-title">Text Input</span>
                        <button class="btn-clear" id="btn-clear-text" title="Clear Text">
                            <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            <span>Clear</span>
                        </button>
                    </div>
                    <div class="editor-wrapper">
                        <textarea id="text-editor" placeholder="Type or paste your text here..." spellcheck="true"></textarea>
                    </div>
                </div>

                <!-- Resizer Gutter -->
                <div class="resizer" id="pane-resizer"></div>

                <!-- Reading Visualizer Pane -->
                <div class="pane visualizer-pane" id="visualizer-pane">
                    <div class="pane-header">
                        <span class="pane-title">Reading Visualizer</span>
                        <div class="visualizer-status" id="visualizer-status">Ready</div>
                    </div>
                    <div class="reader-wrapper" id="reader-wrapper">
                        <div class="reader-view" id="reader-view">
                            <span class="placeholder-text">Type some text on the left and click Speak to begin highlighting!</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Status Bar -->
            <footer class="statusbar">
                <div class="statusbar-left">
                    <span id="reading-progress">0% read</span>
                </div>
                <div class="statusbar-right">
                    <span id="stat-words-footer">0 words</span>
                    <span id="stat-chars-footer">0 chars</span>
                </div>
            </footer>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
