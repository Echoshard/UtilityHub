<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioForge Wave Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="forge-container">
        <!-- Header -->
        <header class="forge-header">
            <div class="header-left">
                <a href="../index.html" class="btn-back">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <span>Hub</span>
                </a>
                <h1>AudioForge</h1>
            </div>
            <div class="header-right">
                <button class="action-btn" id="downloadWavBtn" disabled>Export WAV</button>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="forge-workspace">
            <!-- Left Panel - Actions -->
            <aside class="sidebar actions-panel">
                <h2>Import</h2>
                <label class="btn-import">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>Load Audio File</span>
                    <input type="file" id="audioLoader" accept="audio/*" style="display:none;">
                </label>
                <div class="audio-info" id="audioInfoText">No file loaded</div>

                <div class="divider"></div>

                <h2>Trim & Edit</h2>
                <div class="edit-tools">
                    <button class="action-btn secondary" id="btn-delete" disabled>Delete Range</button>
                    <button class="action-btn secondary" id="btn-silence" disabled>Insert 1s Silence</button>
                </div>

                <div class="divider"></div>

                <h2>Effects</h2>
                <div class="edit-tools">
                    <button class="action-btn secondary" id="btn-fadein" disabled>Fade In Selection</button>
                    <button class="action-btn secondary" id="btn-fadeout" disabled>Fade Out Selection</button>
                    
                    <div class="gain-group">
                        <label>Amplify Gain</label>
                        <div class="gain-control">
                            <input type="range" id="gainSlider" min="0" max="3" step="0.1" value="1.0" disabled>
                            <span id="gainVal">1.0x</span>
                        </div>
                        <button class="action-btn secondary" id="btn-amplify" style="width: 100%; margin-top: 4px;" disabled>Apply Gain</button>
                    </div>
                </div>
            </aside>

            <!-- Center Waveform Area -->
            <main class="waveform-container">
                <div class="zoom-toolbar">
                    <button class="zoom-btn" id="zoomInBtn" disabled>Zoom In (+)</button>
                    <button class="zoom-btn" id="zoomOutBtn" disabled>Zoom Out (-)</button>
                </div>
                
                <!-- The interactive Waveform Canvas -->
                <div class="wave-board" id="waveBoard">
                    <canvas id="waveCanvas" width="800" height="240"></canvas>
                    <!-- Selection visual highlights -->
                    <div class="selection-overlay" id="selectionOverlay"></div>
                    <!-- Playback cursor -->
                    <div class="play-cursor" id="playCursor"></div>
                </div>
                
                <!-- Selection readout -->
                <div class="selection-readout">
                    <div>Selection Start: <span id="selectStartText">0.00s</span></div>
                    <div>Selection End: <span id="selectEndText">0.00s</span></div>
                    <div>Total Duration: <span id="totalDurationText">0.00s</span></div>
                </div>
            </main>
        </div>

        <!-- Bottom Playback Toolbar -->
        <footer class="player-panel">
            <div class="player-controls">
                <button class="play-btn" id="playBtn" disabled>Play</button>
                <button class="play-btn" id="pauseBtn" disabled>Pause</button>
                <button class="play-btn" id="stopBtn" disabled>Stop</button>
                
                <label class="loop-toggle">
                    <input type="checkbox" id="loopCheck"> Loop Playback
                </label>
            </div>
            
            <div class="progress-bar-container">
                <span class="time-stamp" id="currentTimeText">0:00</span>
                <div class="progress-bar-track" id="progressTrack">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time-stamp" id="maxTimeText">0:00</span>
            </div>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
